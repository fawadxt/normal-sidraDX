<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1E2A3A" />
    <meta name="description" content="SidraWallet — premium mobile wallet for Sidra Chain" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SidraWallet" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="icon" type="image/png" href="/app-icon.png" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>SidraWallet</title>

    <style>
      html,
      body {
        background: #f4f3f0;
        overflow-x: hidden;
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(165deg, #fafaf8 0%, #f4f3f0 55%, #ecebe7 100%);
        transition: opacity 0.4s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash .logo {
        width: 96px;
        height: 96px;
        border-radius: 26px;
        object-fit: cover;
        box-shadow:
          0 16px 48px rgba(30, 42, 58, 0.2),
          0 4px 16px rgba(17, 17, 17, 0.06);
      }
      #splash p {
        margin-top: 18px;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #6f6f76;
      }
    </style>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <img class="logo" src="/app-icon.png" alt="" width="96" height="96" />
      <p>SidraWallet</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
